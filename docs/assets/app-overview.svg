<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">FeatherMac app overview mockup</title>
  <desc id="desc">A sanitized mock screenshot of FeatherMac showing the library, signing, automation, and settings sections.</desc>
  <rect width="1280" height="720" rx="34" fill="#0b1220"/>
  <rect x="38" y="38" width="1204" height="644" rx="26" fill="#111827"/>
  <rect x="38" y="38" width="230" height="644" rx="26" fill="#0f172a"/>
  <circle cx="76" cy="72" r="9" fill="#ef4444"/>
  <circle cx="106" cy="72" r="9" fill="#f59e0b"/>
  <circle cx="136" cy="72" r="9" fill="#22c55e"/>
  <text x="74" y="140" fill="#e5e7eb" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="700">FeatherMac</text>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">
    <rect x="62" y="178" width="182" height="46" rx="12" fill="#2563eb"/>
