  <text x="362" y="378" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" font-weight="700">自动配置</text>
  <text x="362" y="420" fill="#cbd5e1" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">Bundle prefix: com.example</text>
  <text x="362" y="458" fill="#cbd5e1" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">Profile: create or reuse</text>
  <text x="362" y="496" fill="#cbd5e1" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">Install after signing: on</text>
