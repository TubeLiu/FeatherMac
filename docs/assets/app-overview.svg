    <text x="96" y="438" fill="#cbd5e1">自动配置 / CI</text>
    <text x="96" y="494" fill="#cbd5e1">设置 / Settings</text>
  </g>
  <text x="304" y="102" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="30" font-weight="700">签名工作台 / Signing Workbench</text>
  <rect x="304" y="132" width="878" height="170" rx="18" fill="#1f2937"/>
  <text x="332" y="176" fill="#e5e7eb" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="21" font-weight="700">Imported IPA</text>
  <rect x="332" y="198" width="390" height="46" rx="10" fill="#111827"/>
  <text x="356" y="228" fill="#93c5fd" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">ExampleApp  com.example.app</text>
