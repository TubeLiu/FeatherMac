    <rect x="54" y="42" width="230" height="724" rx="22" class="sidebar"/>
    <circle cx="86" cy="70" r="8" fill="#ff5f57"/><circle cx="112" cy="70" r="8" fill="#ffbd2e"/><circle cx="138" cy="70" r="8" fill="#28c840"/>
    <text x="170" y="77" class="small muted">FeatherMac</text>
    <rect x="72" y="100" width="194" height="36" rx="8" fill="transparent"/><text x="102" y="124" class="small muted">Library</text><circle cx="88" cy="118" r="6" fill="#9ca3af"/><rect x="72" y="148" width="194" height="36" rx="8" fill="transparent"/><text x="102" y="172" class="small muted">Sources</text><circle cx="88" cy="166" r="6" fill="#9ca3af"/><rect x="72" y="196" width="194" height="36" rx="8" fill="transparent"/><text x="102" y="220" class="small muted">Certificates</text><circle cx="88" cy="214" r="6" fill="#9ca3af"/><rect x="72" y="244" width="194" height="36" rx="8" fill="transparent"/><text x="102" y="268" class="small muted">Signing</text><circle cx="88" cy="262" r="6" fill="#9ca3af"/><rect x="72" y="292" width="194" height="36" rx="8" fill="#e4e7ec"/><text x="102" y="316" class="small ">Automation</text><circle cx="88" cy="310" r="6" fill="#4f46e5"/><rect x="72" y="340" width="194" height="36" rx="8" fill="transparent"/><text x="102" y="364" class="small muted">Settings</text><circle cx="88" cy="358" r="6" fill="#9ca3af"/>
    <rect x="284" y="92" width="942" height="1" fill="#e5e7eb"/>
    <text x="306" y="74" class="title">Automation</text>
    <rect x="1032" y="55" width="80" height="34" rx="8" fill="#f3f4f6"/><text x="1053" y="77" class="btn">Import</text>
    <rect x="1124" y="55" width="80" height="34" rx="8" fill="#f3f4f6"/><text x="1144" y="77" class="btn">Refresh</text>
    <text x="306" y="126" class="tiny muted">Generated with demo data for public documentation.</text>
    <rect x="306" y="150" width="878" height="210" rx="12" class="panel"/>
<text x="326" y="184" class="section">Workflow</text>
<text x="326" y="226" class="small muted">Imported IPA</text><rect x="432" y="204" width="332" height="36" rx="8" fill="white"/><text x="448" y="228" class="small">Feather iOS  com.example.feather</text>
<text x="800" y="226" class="small muted">Certificate</text><rect x="870" y="204" width="292" height="36" rx="8" fill="white"/><text x="886" y="228" class="small">Apple Development Demo</text>
<text x="326" y="272" class="small muted">Bundle Prefix</text><rect x="432" y="250" width="332" height="36" rx="8" fill="white"/><text x="448" y="274" class="small">com.example.feathermac</text>
<rect x="870" y="254" width="18" height="18" rx="4" fill="#4f46e5"/><text x="900" y="270" class="small">Install after workflow</text>
<text x="326" y="314" class="small muted">Suggested Bundle ID</text><text x="474" y="314" class="small">com.example.feathermac.feather</text>
