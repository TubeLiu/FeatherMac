<rect x="306" y="446" width="878" height="74" rx="12" class="panel"/><text x="326" y="478" class="section">Icon Replacement</text><text x="326" y="506" class="small muted">Replace app icon with demo-icon.png</text><rect x="1048" y="468" width="114" height="34" rx="8" fill="#f3f4f6"/><text x="1068" y="490" class="btn">Choose Icon</text>
<rect x="306" y="548" width="878" height="138" rx="12" class="panel"/><text x="326" y="582" class="section">App Store Connect API</text>
<text x="326" y="622" class="small muted">Issuer ID</text><rect x="402" y="600" width="286" height="36" rx="8" fill="white"/><text x="418" y="624" class="mono">00000000-0000-demo</text>
<text x="718" y="622" class="small muted">Key ID</text><rect x="776" y="600" width="174" height="36" rx="8" fill="white"/><text x="792" y="624" class="mono">DEMO123456</text>
<text x="326" y="664" class="small muted">Bundle Prefix</text><rect x="432" y="642" width="332" height="36" rx="8" fill="white"/><text x="448" y="666" class="small">com.example.feathermac</text>
<rect x="806" y="646" width="18" height="18" rx="4" fill="#4f46e5"/><text x="836" y="662" class="small">Register connected device</text>
<text x="326" y="708" class="tiny muted">The API key creates Bundle IDs, registers the connected device, and downloads profiles.</text>

    <text x="746" y="728" class="section">Activity</text>
    <rect x="746" y="742" width="438" height="28" rx="8" fill="#f8fafc"/>
    <text x="762" y="762" class="tiny green">Success</text><text x="826" y="762" class="tiny muted">Workflow is ready.</text>
  </g>
</svg>
