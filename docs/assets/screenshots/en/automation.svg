<rect x="326" y="326" width="126" height="34" rx="8" fill="#4f46e5"/><text x="348" y="348" class="btn white">Run Workflow</text>
<rect x="464" y="326" width="128" height="34" rx="8" fill="#e5e7eb"/><text x="484" y="348" class="btn">Install Result</text>
