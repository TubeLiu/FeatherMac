<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-label="Automation screenshot">
  <defs>
    <linearGradient id="icon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/><stop offset="0.52" stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;fill:#111827} .muted{fill:#6b7280}.tiny{font-size:14px}.small{font-size:16px}.body{font-size:18px}.title{font-size:26px;font-weight:700}.section{font-size:18px;font-weight:700}.btn{font-size:15px;font-weight:600}.chip{font-size:14px;font-weight:600}.mono{font-family:'SF Mono',Menlo,monospace;font-size:15px}.green{fill:#16a34a}.orange{fill:#f59e0b}.sidebar{fill:#f5f6f8}.panel{fill:#f4f5f7}.line{stroke:#e5e7eb;stroke-width:1}.accent{fill:#4f46e5}.white{fill:#fff}
    </style>
  </defs>
  <rect width="1280" height="820" rx="28" fill="#eef2f7"/>
